<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 4 - Grillas y Alineaciones de Textos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .header-responsive {
      background-color: #f4b8c8;
      color: #212529;
    }
    @media (min-width: 576px) {
      .header-responsive {
        background-color: #00ffff;
        color: #212529;
      }
    }
    @media (min-width: 768px) {
      .header-responsive {
        background-color: #2d6a4f;
        color: #ffffff;
      }
    }

    .box-2 {
      background-color: #00e5ff;
      color: #212529;
    }
    @media (min-width: 576px) {
      .box-2 {
        background-color: #9b2335;
        color: #ffffff;
      }
    }

    .box-3 {
      background-color: #9b2335;
      color: #ffffff;
    }
    @media (min-width: 576px) {
      .box-3 {
        background-color: #aaff00;
        color: #212529;
      }
    }
    @media (min-width: 768px) {
      .box-3 {
        background-color: #9b2335;
        color: #ffffff;
      }
    }

    .box { padding: 1.5rem 1rem; font-size: 1.5rem; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container py-4">

    <div class="row g-0 mb-1">
      <div class="col-12 header-responsive px-3 py-3">
        <span class="fs-5">Header</span>
      </div>
    </div>

    <div class="row g-0 mb-1">

      <div class="col-12 col-sm-6 col-md-4 box text-start text-md-center"
           style="background-color:#9b2335; color:#fff;">
        1
      </div>

      <div class="col-12 col-sm-6 col-md-4 box-2 box text-center text-sm-end text-md-center">
        2
      </div>

      <div class="col-12 col-md-4 box-3 box text-end text-sm-center">
        3
      </div>

    </div>

    <div class="row g-0">
      <div class="col-12 col-md-9 bg-warning box text-center text-md-end"
           style="font-size: 1rem; padding: 0.75rem 1rem;">
        Footer 1
      </div>
      <div class="col-12 col-md-3 bg-warning box text-center text-md-start"
           style="font-size: 1rem; padding: 0.75rem 1rem;">
        Footer 2
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
