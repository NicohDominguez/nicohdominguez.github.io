<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2 - Grilla Avanzada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-blue { background-color: #add8e6; }
    .box { padding: 0.75rem; text-align: center; }
  </style>
</head>
<body>
  <div class="container py-4">

    <div class="row g-2 mb-2">
      <div class="col-12">
        <div class="bg-success text-white box">header</div>
      </div>
    </div>

    <div class="row g-2 mb-2 d-sm-none">
      <div class="col-12">
        <div class="bg-danger-subtle box">banner mobile</div>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-12">
        <div class="bg-info box">banner interno</div>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-12 col-md-6">
        <div class="bg-secondary-subtle box">columna izquierda</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="bg-secondary-subtle box">columna derecha</div>
      </div>
    </div>

    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-2 mb-2">
      <div class="col"><div class="col-blue box">col 1</div></div>
      <div class="col"><div class="col-blue box">col 2</div></div>
      <div class="col"><div class="col-blue box">col 3</div></div>
      <div class="col"><div class="col-blue box">col 4</div></div>
      <div class="col"><div class="col-blue box">col 5</div></div>
      <div class="col"><div class="col-blue box">col 6</div></div>
      <div class="col"><div class="col-blue box">col 7</div></div>
      <div class="col"><div class="col-blue box">col 8</div></div>
      <div class="col"><div class="col-blue box">col 9</div></div>
      <div class="col"><div class="col-blue box">col 10</div></div>
    </div>

    <div class="row g-2">
      <div class="col-12">
        <div class="bg-success text-white box">footer</div>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
