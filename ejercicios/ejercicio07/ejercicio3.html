<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 - Grilla y Clases Auxiliares</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box { padding: 2rem 0.5rem; text-align: center; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="container py-3">

    <div class="row g-2 mb-2">
      <div class="col-12">
        <div class="bg-success text-white box fw-bold">Header</div>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-6 col-sm-3 col-md-3">
        <div class="bg-secondary-subtle box">1</div>
      </div>
      <div class="col-6 col-sm-3 col-md-3 offset-md-3">
        <div class="bg-secondary-subtle box">2</div>
      </div>

      <div class="w-100 d-none d-md-block"></div>

      <div class="col-6 col-sm-3 col-md-3 offset-md-3">
        <div class="bg-secondary-subtle box">3</div>
      </div>
      <div class="col-6 col-sm-3 col-md-3 offset-md-3">
        <div class="bg-secondary-subtle box">4</div>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-6 col-sm-3 order-md-4">
        <div class="bg-warning box">a</div>
      </div>
      <div class="col-6 col-sm-3 order-md-3">
        <div class="bg-warning box">b</div>
      </div>
      <div class="col-6 col-sm-3 order-md-2">
        <div class="bg-warning box">c</div>
      </div>
      <div class="col-6 col-sm-3 order-md-1">
        <div class="bg-warning box">d</div>
      </div>
    </div>

    <div class="row g-2 mb-2 d-sm-none">
      <div class="col-12"><div class="bg-info box">mobile</div></div>
    </div>
    <div class="row g-2 mb-2 d-none d-sm-flex d-md-none">
      <div class="col-12"><div class="bg-info box">tablet</div></div>
    </div>
    <div class="row g-2 mb-2 d-none d-md-flex">
      <div class="col-12"><div class="bg-info box">desktop</div></div>
    </div>

    <div class="row g-2 mb-2">
      <div class="d-none d-sm-block col-sm-6 col-md-3 offset-md-3">
        <div class="bg-danger text-white box">:(</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3">
        <div class="bg-danger text-white box">:D</div>
      </div>
    </div>

    <div class="row g-2 d-none d-sm-flex">
      <div class="col-12">
        <div class="bg-success text-white box fw-bold">footer</div>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
